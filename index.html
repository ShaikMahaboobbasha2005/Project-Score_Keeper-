<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>
<body>
    <style>
        .winner{
            color: green;
        }
        .loser{
            color: red;
        }
    </style>
    
<section class="section">
    <div class="container">
        <div class="columns">
            <div class="column is-half is-offset-one-quarter">
                <div class="card">
                    <div class="card-image">
                        <figure class="image is-2by1">
                            <image src="https://img.magnific.com/free-photo/beautiful-ping-pong-rackets-with-ball-blue-underground_24972-22.jpg?semt=ais_hybrid&w=740&q=80"
                        </figure>
                    </div>
  <header class="card-header">
    <p class="card-header-title">Ping Pong Score Keeper</p>
    <button class="card-header-icon" aria-label="more options">
      <span class="icon">
        <i class="fas fa-angle-down" aria-hidden="true"></i>
      </span>
    </button>
  </header>
  <div class="card-content">
    <div class="content">
      
        <h1 class="title is-1">
            <span id="p1Display">0</span>
            to
            <span id="p2Display">0</span>
        </h1>
<p class="subtitle">Use the buttons to keep score</p>
<label for="playto" class="label is-large is-inline">Playing to</label>
<div class="select is-rounded">
        <select id="playto">
                <option value="3">3</option>
                <option value="5" selected>5</option>
                <option value="7">7</option>
                <option value="10">10</option>
                <option value="15">15</option>
            </select>
</div>
       
    </div>
  </div>
  <footer class="card-footer">
    <button id="p1Button" class="is-primary button card-footer-item">+1 Player One</button>
    <button id="p2Button" class="is-info button card-footer-item">+1 Player Two</button>
    <button id="reset" class="is-danger button card-footer-item">Reset</button>
  </footer>
</div>

            </div>
        </div>
    </section>
    
       
    <script src="script.js"></script>
</body>
</html>
